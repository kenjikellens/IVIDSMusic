<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IVIDS Music — stream your favourite music ad-free.">
    <title>IVIDS Music</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="loader.css">
    <script type="module" src="../logic/loader.js"></script>
</head>

<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <aside id="sidebar-container">
            <div class="sidebar-brand">
                <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" />
                    <circle cx="12" cy="12" r="3" fill="currentColor" />
                    <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" />
                </svg>
                <span class="brand-name">IVIDS</span>
            </div>

            <nav>
                <ul class="nav-links">
                    <li>
                        <a href="#" class="active" onclick="Router.loadPage('home')" id="nav-home">
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                                <path d="M3 12L12 3l9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"
                                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                            Home
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="Router.loadPage('search')" id="nav-search">
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                                <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" />
                                <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="1.8"
                                    stroke-linecap="round" />
                            </svg>
                            Search
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="Router.loadPage('library')" id="nav-library">
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                                <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor"
                                    stroke-width="1.8" />
                                <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor"
                                    stroke-width="1.8" />
                                <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor"
                                    stroke-width="1.8" />
                                <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor"
                                    stroke-width="1.8" />
                            </svg>
                            Your Library
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="Router.loadPage('playlists')" id="nav-playlists">
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                                <path d="M4 6h16M4 12h10M4 18h7" stroke="currentColor" stroke-width="1.8"
                                    stroke-linecap="round" />
                                <circle cx="19" cy="17" r="3" stroke="currentColor" stroke-width="1.8" />
                            </svg>
                            Playlists
                        </a>
                    </li>
                </ul>

                <div class="nav-divider"></div>

                <ul class="nav-links">
                    <li>
                        <a href="#" onclick="Router.loadPage('settings')" id="nav-settings">
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8" />
                                <path
                                    d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
                                    stroke="currentColor" stroke-width="1.8" />
                            </svg>
                            Settings
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Content Area with Header -->
        <div class="content-wrapper">
            <header>
                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" />
                        <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                    <input type="text" placeholder="Artists, songs, albums..." id="header-search-input"
                        onkeydown="if(event.key === 'Enter') { Router.loadPage('search', { query: this.value }); }">
                </div>
                <div class="header-right">
                    <div class="user-profile" title="User Profile">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8" />
                            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8"
                                stroke-linecap="round" />
                        </svg>
                    </div>
                </div>
            </header>

            <!-- Main View for Dynamic Content -->
            <main id="main-view"></main>

            <!-- Persistent Player Bar -->
            <footer id="player-bar" class="is-inactive">
                <!-- Left: Song Info -->
                <div class="player-info">
                    <img src="" id="player-cover" class="player-cover" alt="">
                    <div class="player-track-details">
                        <div id="player-title" class="player-title">—</div>
                        <div id="player-artist" class="player-artist">—</div>
                        <div id="player-status-container" class="player-status">
                            <div id="player-loader" class="ivids-loader small"></div>
                            <div id="download-status" class="player-status-text">Preparing...</div>
                        </div>
                    </div>
                </div>
                <!-- Center: Controls & Progress -->
                <div class="player-controls">
                    <div class="player-main-controls">
                        <button class="player-control-btn secondary" onclick="YouTubePlayer.previous()"
                            title="Previous">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                            </svg>
                        </button>
                        <button id="play-pause-btn" class="player-control-btn main" title="Play / Pause">
                            <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                        </button>
                        <button class="player-control-btn secondary" onclick="YouTubePlayer.next()" title="Next">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                            </svg>
                        </button>
                    </div>
                    <div class="player-progress">
                        <span id="current-time" class="time-label">0:00</span>
                        <input type="range" id="progress-slider" class="ivids-slider" value="0" min="0" max="100">
                        <span id="total-duration" class="time-label">0:00</span>
                    </div>
                </div>
                <!-- Right: Volume -->
                <div class="player-volume">
                    <svg class="player-volume-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
                    </svg>
                    <input type="range" id="volume-slider" class="ivids-slider player-volume-slider" value="100" min="0"
                        max="100">
                </div>
            </footer>
        </div>
    </div>

    <!-- Screensaver Overlay -->
    <div id="screensaver-overlay"></div>

    <script type="module">
        import { Router } from '../logic/router.js';
        import '../logic/player.js';

        window.onload = () => {
            Router.loadPage('home');
        };

        // Screensaver logic
        let idleTimer;
        const resetTimer = () => {
            document.getElementById('screensaver-overlay').classList.remove('active');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                document.getElementById('screensaver-overlay').classList.add('active');
            }, 60000);
        };
        document.onmousemove = resetTimer;
        document.onkeypress = resetTimer;
        resetTimer();
    </script>
</body>

</html>
