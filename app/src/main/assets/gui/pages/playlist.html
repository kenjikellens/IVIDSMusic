<div class="playlist-page page-container">
    <!-- Hero Section -->
    <div class="playlist-hero" style="position: relative; overflow: hidden; padding: 40px 20px; border-radius: 16px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);">
        <div class="hero-bg" id="playlist-hero-bg" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; pointer-events: none; opacity: 0.15;">
            <div class="blob blob-1" style="position: absolute; width: 300px; height: 300px; background: #fff; filter: blur(80px); border-radius: 50%; top: -100px; left: -100px;"></div>
            <div class="blob blob-2" style="position: absolute; width: 300px; height: 300px; background: var(--accent-glow, #fff); filter: blur(80px); border-radius: 50%; bottom: -100px; right: -100px;"></div>
        </div>
        <div class="playlist-hero-content fade-in" style="position: relative; z-index: 1; display: flex; align-items: center; gap: 30px; flex-wrap: wrap;">
            <div class="playlist-cover-wrapper" id="playlist-cover-wrapper" style="display: flex; align-items: center; justify-content: center; width: 160px; height: 160px; border-radius: 12px; font-size: 4rem; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);">
                📂
            </div>
            <div class="playlist-info-wrapper" style="flex: 1; min-width: 250px;">
                <h1 id="playlist-details-name" class="playlist-details-name" style="font-size: 2.2rem; font-weight: 800; margin: 0; color: #fff;">Playlist</h1>
                <p id="playlist-details-desc" class="playlist-details-desc" style="color: rgba(255, 255, 255, 0.6); margin-top: 8px; font-size: 1rem; margin-bottom: 0;"></p>
                <div class="playlist-stats" id="playlist-stats" style="margin-top: 10px; font-size: 0.9rem; color: rgba(255, 255, 255, 0.4);">
                    <span id="playlist-track-count">0 songs</span>
                </div>
                <div class="playlist-actions" style="margin-top: 20px; display: flex; gap: 12px;">
                    <button class="btn btn-primary" id="play-playlist-btn" disabled style="display: flex; align-items: center; gap: 8px; padding: 10px 24px; font-size: 0.95rem;">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" style="width: 18px; height: 18px;">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                        <span data-i18n="play_all">Play All</span>
                    </button>
                    <button class="btn btn-secondary" id="delete-playlist-detail-btn" style="border-color: rgba(255,50,50,0.3); color: #ff5252; padding: 10px 20px; font-size: 0.95rem; display: flex; align-items: center; gap: 8px;">
                        <span data-i18n="delete_playlist">Delete Playlist</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Content Sections -->
    <div class="playlist-content-section" style="margin-top: 30px;">
        <!-- Track Empty State -->
        <div id="playlist-tracks-empty" class="library-empty-state is-hidden" style="text-align: center; padding: 60px 20px; background: rgba(255, 255, 255, 0.01); border-radius: 12px; border: 1px dashed rgba(255, 255, 255, 0.05);">
            <div style="font-size: 3rem; margin-bottom: 15px;">🎵</div>
            <h3 data-i18n="library_empty_title" style="margin: 0; font-size: 1.3rem;">This playlist is empty</h3>
            <p data-i18n="library_empty_desc" style="color: rgba(255, 255, 255, 0.5); margin-top: 8px; font-size: 0.95rem;">Add songs to this playlist from Home or Search to listen offline!</p>
        </div>

        <!-- Tracks List -->
        <div id="playlist-tracks-list" class="library-list">
            <!-- Rendered by pages.js -->
        </div>
    </div>
</div>
