<div class="profile-container">
    <div class="profile-header">
        <div class="profile-avatar-wrapper">
            <img src="svg/user.svg" alt="Avatar" class="profile-avatar">
            <div class="profile-avatar-edit">
                <img src="svg/search.svg" alt="Edit" style="filter: invert(1);">
            </div>
        </div>
        <div class="profile-basic-info">
            <h1 class="profile-name" id="profile-name-display" data-i18n="listener">Listener</h1>
            <p class="profile-bio" id="profile-bio-display" data-i18n="no_bio">No bio yet.</p>
            <div class="profile-actions">
                <button class="btn btn-primary" data-i18n="edit_profile">Edit Profile</button>
            </div>
        </div>
    </div>

    <div class="profile-stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="stat-liked-count">0</div>
            <div class="stat-label" data-i18n="liked_songs">Liked Songs</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-playlists-count">0</div>
            <div class="stat-label" data-i18n="playlists">Playlists</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-minutes-count">0</div>
            <div class="stat-label" data-i18n="minutes_played">Minutes Played</div>
        </div>
    </div>

    <div class="profile-content">
        <div class="profile-section">
            <div class="row-header">
                <h2 class="row-title" data-i18n="recently_played">Recently Played</h2>
            </div>
            <div class="row-posters" id="profile-recent-list">
                <!-- Populated by JS -->
            </div>
        </div>

        <div class="profile-section">
            <div class="row-header">
                <h2 class="row-title" data-i18n="top_genres">Top Genres</h2>
            </div>
            <div class="genres-grid" id="profile-genres-list">
                <p class="settings-desc" data-i18n="no_history">No listening history yet.</p>
            </div>
        </div>
    </div>
</div>
