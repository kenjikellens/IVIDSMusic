<div class="settings-container">
    <h1 class="row-title" data-i18n="settings">Settings</h1>

    <div class="settings-section">
        <h2 class="settings-section-title">
            <img class="nav-icon" src="svg/user.svg" alt=""
                style="width: 20px; filter: invert(72%) sepia(98%) saturate(1000%) hue-rotate(155deg) brightness(104%) contrast(104%);">
            <span data-i18n="appearance">Appearance</span>
        </h2>

        <div class="settings-item">
            <div class="settings-info">
                <div class="settings-label" data-i18n="interface_scale">Interface Scale</div>
                <div class="settings-desc" data-i18n="interface_scale_desc">Adjust the size of the UI elements.</div>
            </div>
            <div class="scale-stepper" id="scale-options-container">
                <button class="scale-stepper-btn" id="scale-decrease">-</button>
                <div class="scale-value" id="current-scale-display">100%</div>
                <button class="scale-stepper-btn" id="scale-increase">+</button>
            </div>
        </div>

        <div class="settings-item">
            <div class="settings-info">
                <div class="settings-label" data-i18n="language">Language</div>
                <div class="settings-desc" data-i18n="language_desc">Choose your preferred language.</div>
            </div>
            <div class="lang-display">
                <span class="lang-current-name" id="current-lang-display">English</span>
                <button class="lang-edit-btn" id="lang-edit-btn" tabindex="0" aria-label="Change language">
                    <img src="svg/edit.svg" alt="Edit" class="lang-edit-icon">
                </button>
            </div>
        </div>
    </div>

    <div class="settings-section">
        <h2 class="settings-section-title" data-i18n="about">About</h2>
        <div class="settings-item">
            <div class="settings-info">
                <div class="settings-label" data-i18n="version">Version</div>
                <div class="settings-desc">1.0.0 (Beta)</div>
            </div>
        </div>
        <div class="settings-item">
            <div class="settings-info">
                <div class="settings-label" data-i18n="powered_by">Powered by</div>
                <div class="settings-desc">IVIDS Engine &amp; YouTube Music</div>
            </div>
        </div>
    </div>
</div>

<!-- Language Selection Modal -->
<div class="lang-modal-overlay" id="lang-modal-overlay" style="display:none;">
    <div class="lang-modal" role="dialog" aria-label="Choose Language">
        <div class="lang-modal-header">
            <h3 class="lang-modal-title" data-i18n="language">Language</h3>
            <button class="lang-modal-close" id="lang-modal-close" tabindex="0" aria-label="Close">
                <img src="svg/close.svg" alt="Close">
            </button>
        </div>
        <div class="lang-modal-list" id="lang-modal-list">
            <!-- Language options are generated dynamically by LanguageManager -->
        </div>
    </div>
</div>
